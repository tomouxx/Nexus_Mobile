<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Nexus Icon Generator</title>
</head>
<body>
<canvas id="icon" width="1024" height="1024"></canvas>
<canvas id="adaptive" width="1024" height="1024"></canvas>
<canvas id="splash" width="512" height="512"></canvas>
<script>
// ─── Main App Icon (1024x1024) ───────────────────────
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#0E0E32');
  grad.addColorStop(1, '#1a1a4d');
  ctx.fillStyle = grad;

  // Rounded rectangle
  const r = w * 0.22;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(w - r, 0);
  ctx.quadraticCurveTo(w, 0, w, r);
  ctx.lineTo(w, h - r);
  ctx.quadraticCurveTo(w, h, w - r, h);
  ctx.lineTo(r, h);
  ctx.quadraticCurveTo(0, h, 0, h - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Subtle glow circle
  const glowGrad = ctx.createRadialGradient(cx, cy * 0.7, 0, cx, cy * 0.7, w * 0.5);
  glowGrad.addColorStop(0, 'rgba(255,255,255,0.06)');
  glowGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, w, h);

  // Hub/Network icon (representing Nexus = connection)
  drawNexusSymbol(ctx, cx, cy - h * 0.04, w * 0.32);

  // "N" letter
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${w * 0.18}px "Arial", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', cx, cy - h * 0.02);

  // "NEXUS" text below
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `600 ${w * 0.07}px "Arial", sans-serif`;
  ctx.letterSpacing = `${w * 0.01}px`;
  ctx.fillText('NEXUS', cx, cy + h * 0.22);

  // "by SQLI" subtitle
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = `400 ${w * 0.04}px "Arial", sans-serif`;
  ctx.fillText('by SQLI', cx, cy + h * 0.30);
}

function drawNexusSymbol(ctx, cx, cy, radius) {
  // Hexagonal network nodes
  const nodes = 6;
  const points = [];

  for (let i = 0; i < nodes; i++) {
    const angle = (Math.PI * 2 / nodes) * i - Math.PI / 2;
    points.push({
      x: cx + Math.cos(angle) * radius,
      y: cy + Math.sin(angle) * radius,
    });
  }

  // Connection lines
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 3;
  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {
      ctx.beginPath();
      ctx.moveTo(points[i].x, points[i].y);
      ctx.lineTo(points[j].x, points[j].y);
      ctx.stroke();
    }
  }

  // Outer ring
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, radius, 0, Math.PI * 2);
  ctx.stroke();

  // Node dots
  points.forEach(p => {
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.beginPath();
    ctx.arc(p.x, p.y, 8, 0, Math.PI * 2);
    ctx.fill();
  });
}

// ─── Adaptive Icon Foreground (1024x1024, transparent BG) ───
function drawAdaptive(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const cx = w / 2;
  const cy = h / 2;

  // Transparent background
  ctx.clearRect(0, 0, w, h);

  // Background fill for adaptive
  const grad = ctx.createLinearGradient(0, 0, w, h);
  grad.addColorStop(0, '#0E0E32');
  grad.addColorStop(1, '#1a1a4d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, w, h);

  // Subtle glow
  const glowGrad = ctx.createRadialGradient(cx, cy * 0.7, 0, cx, cy * 0.7, w * 0.5);
  glowGrad.addColorStop(0, 'rgba(255,255,255,0.06)');
  glowGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glowGrad;
  ctx.fillRect(0, 0, w, h);

  drawNexusSymbol(ctx, cx, cy - h * 0.04, w * 0.25);

  // "N"
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${w * 0.18}px "Arial", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', cx, cy - h * 0.02);

  // "NEXUS"
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `600 ${w * 0.065}px "Arial", sans-serif`;
  ctx.fillText('NEXUS', cx, cy + h * 0.18);

  // "by SQLI"
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = `400 ${w * 0.038}px "Arial", sans-serif`;
  ctx.fillText('by SQLI', cx, cy + h * 0.25);
}

// ─── Splash Icon (512x512) ───
function drawSplash(canvas) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const cx = w / 2;
  const cy = w / 2;

  ctx.clearRect(0, 0, w, w);

  drawNexusSymbol(ctx, cx, cy - w * 0.06, w * 0.28);

  // White N
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${w * 0.22}px "Arial", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('N', cx, cy - w * 0.02);

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = `600 ${w * 0.08}px "Arial", sans-serif`;
  ctx.fillText('NEXUS', cx, cy + w * 0.22);

  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = `400 ${w * 0.045}px "Arial", sans-serif`;
  ctx.fillText('by SQLI', cx, cy + w * 0.30);
}

drawIcon(document.getElementById('icon'));
drawAdaptive(document.getElementById('adaptive'));
drawSplash(document.getElementById('splash'));

// Export as downloadable PNGs
function downloadCanvas(canvasId, filename) {
  const canvas = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
<div style="padding:20px; font-family: Arial; background: #eee;">
  <h2>Nexus by SQLI - App Icons</h2>
  <p>Right-click on each image to save, or use the buttons:</p>
  <button onclick="downloadCanvas('icon','icon.png')">Download icon.png (1024x1024)</button>
  <button onclick="downloadCanvas('adaptive','adaptive-icon.png')">Download adaptive-icon.png (1024x1024)</button>
  <button onclick="downloadCanvas('splash','splash-icon.png')">Download splash-icon.png (512x512)</button>
</div>
</body>
</html>
